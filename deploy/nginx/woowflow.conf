# ══════════════════════════════════════════════════════════════
#  WOOWFLOW — Nginx Config (produção)
#  Arquivo: /etc/nginx/sites-available/woowflow
#
#  Após copiar:
#    sudo ln -s /etc/nginx/sites-available/woowflow /etc/nginx/sites-enabled/
#    sudo certbot --nginx -d seudominio.com
#    sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=300r/m;

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name seudominio.com;
    return 301 https://$host$request_uri;
}

# HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seudominio.com;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/seudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seudominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Headers de segurança ─────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    # ── Webhook Evolution API (rate limit alto) ───────────────────
    location /webhook/ {
        limit_req zone=webhook burst=50 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Rotas da API (rate limit moderado) ───────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Admin: bloqueia acesso externo ───────────────────────────
    # Remova ou ajuste se precisar de acesso remoto ao /admin
    location /admin/ {
        allow 127.0.0.1;
        # allow SEU_IP_DE_GESTAO;
        deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/woowflow.access.log;
    error_log  /var/log/nginx/woowflow.error.log warn;
}
