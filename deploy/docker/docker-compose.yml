version: '3.9'

services:
  woowflow:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: woowflow
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    volumes:
      - woowflow_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  woowflow_logs:
